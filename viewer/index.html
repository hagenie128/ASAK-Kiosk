<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ASAK Data Viewer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">A</span>
        <div>
          <strong>ASAK</strong>
          <small>A Salad A Kiosk</small>
        </div>
      </div>
      <nav class="nav">
        <button type="button" class="nav-btn active" data-view="dashboard">대시보드</button>
        <button type="button" class="nav-btn" data-view="menus">메뉴</button>
        <button type="button" class="nav-btn" data-view="dressings">드레싱</button>
        <button type="button" class="nav-btn" data-view="stores">매장</button>
      </nav>
      <div class="sidebar-foot" id="load-status">데이터 로딩 중…</div>
    </aside>

    <main class="main">
      <header class="topbar">
        <h1 id="page-title">대시보드</h1>
        <div class="search-wrap" id="search-wrap" hidden>
          <input id="search-input" type="search" placeholder="이름, 카테고리, 드레싱 검색…" />
        </div>
      </header>

      <section id="view-dashboard" class="view active"></section>
      <section id="view-menus" class="view">
        <div class="filters" id="menu-filters"></div>
        <div class="split">
          <div class="list-panel" id="menu-list"></div>
          <div class="detail-panel" id="menu-detail">
            <p class="placeholder">메뉴를 선택하세요</p>
          </div>
        </div>
      </section>
      <section id="view-dressings" class="view"></section>
      <section id="view-stores" class="view">
        <div class="filters" id="store-filters"></div>
        <div class="split store-split">
          <div class="list-panel" id="store-list"></div>
          <div class="detail-panel" id="store-detail">
            <p class="placeholder">매장 메뉴를 선택하세요</p>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
